name: Deploy to EKS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build --platform linux/amd64 -t $ECR_REGISTRY/anchita-dev:$IMAGE_TAG .
          docker push $ECR_REGISTRY/anchita-dev:$IMAGE_TAG
          docker tag $ECR_REGISTRY/anchita-dev:$IMAGE_TAG $ECR_REGISTRY/anchita-dev:latest
          docker push $ECR_REGISTRY/anchita-dev:latest

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name anchita-dev --region us-east-1

      - name: Deploy to EKS
        run: |
          kubectl apply -f k8s/
          kubectl rollout restart deployment anchita-dev
          kubectl rollout status deployment anchita-dev